<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stars in Space</title>
    <script type="module" src="scripts/main.js"></script>
    <link rel="stylesheet" href="./styles/styles.css" />

</head>

<body id="body">
    <div id="control-panel"></div>
    <div class="stars" id="stars-1"></div>

<div class="modal" id="music-menu">

    <div id="music-controls">
        <a class="toggle-btn" id="music-prev">7</a>

        <a class="toggle-btn" id="music-next">8</a>
        <a class="toggle-btn" id="music-repeat">`<sup id="repeat-one">1</sup></a>
